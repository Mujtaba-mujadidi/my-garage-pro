# Web service — set in Railway: Settings → Config file → /apps/web/railway.toml
# Watch paths are repo-root-relative (see https://docs.railway.com/guides/monorepo)

[build]
# API_URL must be set on the web service (used at build time for /api/backend rewrites)
buildCommand = "pnpm install && pnpm --filter @mygaragepro/shared build && NEXT_PUBLIC_BUILD_SHA=$RAILWAY_GIT_COMMIT_SHA pnpm --filter @mygaragepro/web build && test -f apps/web/.next/BUILD_ID"
watchPatterns = [
  "apps/web/**",
  "packages/shared/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
startCommand = "sh apps/web/scripts/railway-start.sh"
